[package]
name = "feather"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
tokio = { version = "1", features = ["full"] }
httparse = "1.7.1"
bytes = "1.2.1"
http = "0.2"
serde_json = "1.0"
serde = { version = "1.0.143", features = ["derive"] }
chrono = "0.4.21"
tokio-rustls = "0.23.4"
rustls-pemfile = "0.2.1"
